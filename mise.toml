# Manage devtools and tasks with mise-en-place.
# https://mise.jdx.dev/configuration.html

min_version = "2025.6.0"

# Improve the IntelliJ IDEA experience:
# ln -s ~/.local/share/mise ~/.asdf
# https://mise.jdx.dev/ide-integration.html#sdk-selection-using-asdf-layout

[tools]
node = "20.19.2"
pnpm = "10.12.1"

[tasks.build]
alias = ["b"]
run = "vite build --ssr src/main.ts"
description = "Generates production-grade build artefacts."

[tasks.check]
alias = ["c"]
depends = ["check_fmt", "check_ts"]
description = "Runs `check_fmt` and `check_ts`."

[tasks.check_fmt]
run = "biome check --error-on-warnings"
description = "Verifies that the source code is well-formatted."

[tasks.check_ts]
alias = ["ts"]
run = "tsc"
description = "Verifies that the source code is type-safe."

[tasks.fmt]
alias = ["f"]
run = "biome check --write"
description = "Reformats the source code with Biome."

[tasks.install]
alias = ["i"]
run = ["pnpm install", "lefthook install"]
description = "Installs third-party packages and enables the Git hooks."

[tasks.test]
alias = ["t"]
env = { CI = 1 }
run = "vitest run"
description = "Runs the entire unit test suite once."

[tasks.vitest]
alias = ["v"]
env = { CI = 1 }
run = "vitest watch --ui --open $MY_VITEST_OPENS_AUTOMATICALLY --api.port $MY_VITEST_PORT"
description = "Starts the Vitest UI test explorer for continuous unit testing."

[tasks.yolo]
run = "lefthook uninstall"
description = "Disables the Git hooks."

[env]
# Load environment variables from the `.env` and `.env.local` files:
# https://mise.jdx.dev/environments/#env-file
_.file = [".env", ".env.local"]

# Make CLI programs in `node_modules` available directly in the command line:
# https://mise.jdx.dev/mise-cookbook/nodejs.html#add-node-modules-binaries-to-the-path
_.path = ["node_modules/.bin"]

[settings]
jobs = 1
quiet = true
